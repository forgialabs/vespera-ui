name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Build the workspace packages (topologically) before the docs, since the
      # docs import the built `@vespera-ui/react` / `@vespera-ui/css` packages.
      - name: Build
        run: pnpm build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
