name: Publish to npm (manual)

# Manual fallback publisher. Normal releases go through the Changesets flow in
# release.yml; use this only to force-publish the current package versions (e.g.
# to bootstrap the first publish, or if a release run's publish step failed).
# pnpm skips any package version already on the registry, so re-running is safe.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build
      - name: Publish to npm
        # Write the token straight into .npmrc so pnpm authenticates reliably.
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
