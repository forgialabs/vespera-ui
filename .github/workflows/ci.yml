name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      # Build first: `@vespera-ui/react` type-checks against the built
      # `@vespera-ui/icons` declarations, so packages must be built (topologically)
      # before type-checking.
      - name: Build
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Test (docs app)
        run: pnpm --filter @vespera-ui/web test

      - name: Test (scripts)
        run: node --test scripts/lib/*.test.mjs
